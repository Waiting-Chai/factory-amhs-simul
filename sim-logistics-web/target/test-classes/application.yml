# Test configuration for sim-logistics-web
# Author: shentw
# Date: 2026-02-10

spring:
  application:
    name: sim-logistics-web-test

  # Test database configuration (H2)
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
    schema: classpath:schema.sql

  # Redis test configuration (use embedded if available)
  redis:
    host: localhost
    port: 6379
    database: 15

  flyway:
    enabled: false

  sql:
    init:
      mode: always

# MyBatis Plus configuration
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id

# Logging configuration
logging:
  level:
    root: INFO
    com.semi.simlogistics: DEBUG
    com.baomidou.mybatisplus: DEBUG
